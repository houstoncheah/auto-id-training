<title>AUTO ID TRAINING</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:Arial, sans-serif;

  background:
    radial-gradient(circle at top,
    #ffffff 0%,
    #e8f0ff 30%,
    #d6e4ff 100%);
}

/* =========================
MACHINE
========================= */

.machine{
  width:1400px;
  padding:30px;
  border-radius:35px;

  background:white;

  box-shadow:
    0 15px 40px rgba(0,0,0,0.12);

  position:relative;
}

.title{
  text-align:center;
  font-size:60px;
  font-weight:bold;

  color:#c9a227;

  margin-bottom:30px;
}

/* =========================
MODE BUTTONS
========================= */

.mode{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:35px;
}

.mode button{
  padding:14px 30px;

  border:none;
  border-radius:14px;

  background:#efefef;

  font-size:20px;
  font-weight:bold;

  cursor:pointer;
}

.mode .active{
  background:#c9a227;
  color:white;
}

/* =========================
SLOTS
========================= */

.slots{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.slot{
  width:420px;
  height:540px;

  background:white;

  border-radius:25px;

  overflow:hidden;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.12);

  position:relative;
}

.slot img{
  width:100%;
  height:100%;
  object-fit:contain;

  padding:10px;

  transform:scale(1.15);
}

.label{
  position:absolute;

  top:15px;
  left:50%;

  transform:translateX(-50%);

  background:#c9a227;

  color:white;

  padding:10px 20px;

  border-radius:12px;

  font-size:20px;
  font-weight:bold;
}

/* =========================
RIGHT PANEL
========================= */

.right-panel{
  display:flex;
  align-items:center;
  gap:20px;
}

/* =========================
COIN SLOT
========================= */

.coin-slot{
  width:140px;
  height:140px;

  border-radius:20px;

  background:white;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.12);

  transition:0.15s;
}

.coin-slot.insert{
  transform:scale(0.92);
}

.coin-hole{
  width:70px;
  height:14px;

  background:#888;

  border-radius:10px;
}

.coin-text{
  margin-top:12px;

  color:#c9a227;

  font-weight:bold;
  font-size:14px;
}

.coin-slot{
  cursor:default;
}

.coin-slot:hover{
  cursor:url("https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/coin.png") 24 24, pointer;
}

/* =========================
RESULT TEXT
========================= */

.result{
  margin-top:30px;

  text-align:center;

  font-size:28px;
  font-weight:bold;

  color:#c9a227;
}

/* =========================
COIN EFFECT
========================= */

.coin-fx{
  position:fixed;

  width:28px;
  height:28px;

  background:url("https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/coin.png")
  no-repeat center/contain;

  pointer-events:none;

  z-index:9999;

  animation:coinFloat 0.9s ease-out forwards;
}

@keyframes coinFloat{

  0%{
    transform:translate(0,0) scale(1);
    opacity:1;
  }

  100%{
    transform:
      translate(
        calc(var(--x) * 1px),
        calc(var(--y) * 1px)
      )
      scale(0.2);

    opacity:0;
  }

}

/* =========================
FULLSCREEN RESULT
========================= */

.fullscreen-result{
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle,
    #ffffff,
    #dfe8ff);

  display:none;

  flex-direction:column;
  justify-content:center;
  align-items:center;

  z-index:9999;
}

.result-images{
  display:flex;
  gap:40px;
}

.result-images img{
  width:28vw;
  height:70vh;

  object-fit:contain;

  background:white;

  border-radius:25px;

  padding:20px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.12);
}

#backBtn{
  margin-top:40px;

  padding:18px 40px;

  border:none;
  border-radius:15px;

  background:#c9a227;

  color:white;

  font-size:24px;
  font-weight:bold;

  cursor:pointer;
}

</style>
</head>

<script>

/* =========================

const fallbackImg =

"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/2.webp",

"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/5.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/6.webp"
];

const job = [
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/1.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/2.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/3.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/4.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/5.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/6.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/7.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/8.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/9.webp",
"https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/10.webp",
];

const sr = Array.from(
{length:26},
(_,i)=>`https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/sr/${i+1}.webp`
);

const bt = Array.from(
{length:16},
(_,i)=>`https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/bt/${i+1}.webp`
);

/* =========================
ELEMENTS
========================= */

const industryImg =
document.getElementById("industryImg");

const jobImg =
document.getElementById("jobImg");

const funcImg =
document.getElementById("funcImg");

const spinBtn =
document.getElementById("spinBtn");

const resultText =
document.getElementById("resultText");

const machine =
document.querySelector(".machine");

const fullscreenResult =
document.getElementById("fullscreenResult");

const finalIndustry =
document.getElementById("finalIndustry");

const finalJob =
document.getElementById("finalJob");

const finalFunc =
document.getElementById("finalFunc");

const backBtn =
document.getElementById("backBtn");

safeImage(industryImg);
safeImage(jobImg);
safeImage(funcImg);
safeImage(finalIndustry);
safeImage(finalJob);
safeImage(finalFunc);

/* =========================
MODE BUTTONS
========================= */

srBtn.onclick = ()=>{

  mode = "SR";

  srBtn.classList.add("active");
  btBtn.classList.remove("active");

    /* reset back to cover */

  industryImg.src="https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/cover.webp";
  jobImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/cover.webp";

};

btBtn.onclick = ()=>{

  mode = "BT";

  btBtn.classList.add("active");
  srBtn.classList.remove("active");
  
    /* reset back to cover */

  industryImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/cover.webp";
  jobImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/cover.webp";
  funcImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/bt/cover.webp";

  funcLabel.innerText =
  "BT Function";

};

/* =========================
RANDOM
========================= */

function rand(arr){
  return arr[
    Math.floor(
      Math.random() * arr.length
    )
  ];
}

/* =========================
SPIN
========================= */

function spin(img, arr, duration){

  return new Promise(resolve=>{

    let speed = 80;
    let elapsed = 0;

    const timer = setInterval(()=>{

const next = rand(arr);
img.onerror = () => {
  img.src = fallbackImg;
};
img.src = next;
      elapsed += speed;

      if(elapsed > duration * 0.5){
        speed += 15;
      }

      if(elapsed >= duration){

        clearInterval(timer);

const finalImage = rand(arr);
img.onerror = () => {
  img.src = fallbackImg;
};
img.src = finalImage;

        resolve(finalImage);
      }

    }, speed);

  });

}

/* =========================
COINS
========================= */

function spawnCoins(x,y){

  for(let i=0;i<10;i++){

    const coin =
    document.createElement("div");

    coin.className =
    "coin-fx";

    document.body.appendChild(coin);

    const angle =
    Math.random() *
    Math.PI * 2;

    const distance =
    80 + Math.random()*80;

    const dx =
    Math.cos(angle)*distance;

    const dy =
    Math.sin(angle)*distance;

    coin.style.left =
    x + "px";

    coin.style.top =
    y + "px";

    coin.style.setProperty("--x",dx);
    coin.style.setProperty("--y",dy);

    setTimeout(()=>{
      coin.remove();
    },900);

  }

}

/* =========================
START MUSIC
========================= */

window.addEventListener(
"click",
startMusic,
{ once:true }
);

function startMusic(){

  bgm.volume = 0.25;

  bgm.play().catch(()=>{});

}

/* =========================
SPIN BUTTON
========================= */

spinBtn.onclick = async ()=>{

  if(spinning) return;

  spinning = true;

  /* coin animation */

  spinBtn.classList.add("insert");

  setTimeout(()=>{
    spinBtn.classList.remove("insert");
  },200);

  /* spawn coins */

  const rect =
  spinBtn.getBoundingClientRect();

  spawnCoins(
    rect.left + rect.width/2,
    rect.top + rect.height/2
  );

  /* sounds */

  spinSound.currentTime = 0;
  spinSound.play();

  resultText.innerText =
  "SPINNING...";

  const func =
  mode === "SR"
  ? sr
  : bt;

  /* column by column */

  const finalIndustryImg =
  await spin(
    industryImg,
    industry,
    2200
  );

  const finalJobImg =
  await spin(
    jobImg,
    job,
    2200
  );

  const finalFuncImg =
  await spin(
    funcImg,
    func,
    2200
  );

  /* stop spin sound */

  spinSound.pause();
  spinSound.currentTime = 0;

  /* result sound */

  resultSound.currentTime = 0;
  resultSound.play();

  resultText.innerText =
  "RESULT READY";

  /* fullscreen result */

  setTimeout(()=>{

    machine.style.display =
    "none";

    fullscreenResult.style.display =
    "flex";

    finalIndustry.src =
    finalIndustryImg;

    finalJob.src =
    finalJobImg;

    finalFunc.src =
    finalFuncImg;

  },700);

  spinning = false;
  

};

/* =========================
BACK BUTTON
========================= */

backBtn.onclick = ()=>{

  fullscreenResult.style.display =
  "none";

  machine.style.display =
  "block";

  /* reset back to cover */

  industryImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/industry/cover.webp";
  jobImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/jobrole/cover.webp";
  funcImg.src = "https://raw.githubusercontent.com/houstoncheah/AUTO-ID-DEMO-TRAINING-CARD/main/sr/cover.webp";

  resultText.innerText =
  "Insert coin to start";

};

/* Image fail Handling */

function safeImage(imgElement, fallback = fallbackImg) {
  imgElement.onerror = () => {
    console.warn("Image failed:", imgElement.src);
    imgElement.src = fallback;
  };
}

function loadWithRetry(img, url, fallback, retry = 1) {
  img.onerror = () => {
    if (retry > 0) {
      setTimeout(() => {
        img.src = url; // retry once
      }, 300);
    } else {
      img.src = fallback;
    }
    retry--;
  };

  img.src = url;
}
